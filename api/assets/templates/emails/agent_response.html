<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message from your agent</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 640px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            background: #24324a;
            color: white;
            padding: 28px 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }
        .content {
            padding: 34px 30px;
        }
        .content p {
            margin: 16px 0;
            color: #555;
        }
        .content a {
            color: #3f6fd9;
        }
        .footer {
            background: #f8f9fa;
            padding: 22px 30px;
            text-align: center;
            color: #888;
            font-size: 14px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>InnomightLabs</h1>
        </div>

        <div class="content">
            {{body}}
        </div>

        <div class="footer">
            <p>InnomightLabs - AI-Powered Agent Platform</p>
        </div>
    </div>
</body>
</html>
