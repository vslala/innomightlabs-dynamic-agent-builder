id: agent_invocation
namespace: core.automation
name: Invoke Agent
description: Send a smart-value prompt to one of your agents.
repeatable: true
repeatable_identity_fields: [target_agent_id]
system_prompt: |
  Use this skill to invoke the configured agent with a prompt.
form:
  - input_type: select
    name: target_agent_id
    label: Agent
    options_source:
      type: agents
actions:
  - name: invoke
    description: Invoke an agent and return response text, runtime events, and saved message ids.
    input_schema:
      type: object
      required: [prompt_template]
      properties:
        agent_id:
          type: string
          description: Optional agent id override. Installed agent skills use the configured target agent by default.
        prompt_template:
          type: string
          description: Prompt text after automation smart values have been rendered.
    action_form:
      form_name: Invoke Agent
      submit_path: ""
      form_inputs:
        - input_type: select
          name: agent_id
          label: Agent
          options_source:
            type: agents
          attr:
            source: agents
        - input_type: text_area
          name: prompt_template
          label: Prompt template
          attr:
            rows: "10"
            smart_values: "true"
    handler: actions:invoke
