id: lead_capture
namespace: growth.leads
name: Interactive Forms
description: Render interactive forms in the widget to collect structured inputs. Optionally register submissions as leads.
system_prompt: |
  Use this skill to collect structured input from the user via interactive forms.

  You can use forms for:
  - Lead capture (demo requests, contact sales)
  - Feedback collection
  - Asking the user to choose from multiple options
  - Multi-step clarification to gather missing fields

  Recommended flow:
  1) Call action=render_form (default) or action=render_custom_form (custom schema) to show a form.
  2) After the user submits, the conversation will contain a <form_submission> block.
  3) If appropriate, call action=register_lead with the form label and answers to store it.

  Notes:
  - Always include a clear reason why you are collecting information.
  - Do not request sensitive data (passwords, card numbers).
  - When a lead is registered, the system may send an acknowledgement email.
actions:
  - name: render_form
    description: Return a form schema to collect lead details in the widget.
    input_schema:
      type: object
      properties:
        form_label:
          type: string
          description: Human label for the form (e.g. "Request a demo").
        submit_label:
          type: string
          description: Button label (defaults to "Submit").
      required: [form_label]
    handler: actions:render_form
  - name: render_custom_form
    description: Render a custom form schema (bounded) in the widget for lead capture.
    input_schema:
      type: object
      properties:
        form_label:
          type: string
          description: Human label for the form (e.g. "Request a demo").
        submit_label:
          type: string
          description: Button label (defaults to "Submit").
        form_inputs:
          type: array
          description: List of form inputs following the platform Form schema.
          items:
            type: object
      required: [form_label, form_inputs]
    handler: actions:render_custom_form

  - name: register_lead
    description: Store a lead submission for this agent and optionally send an acknowledgement email.
    input_schema:
      type: object
      properties:
        form_label:
          type: string
          description: Human label for the form (e.g. "Request a demo").
        answers:
          type: array
          description: Field answers from the form submission.
          items:
            type: object
            properties:
              field_id: { type: string }
              label: { type: string }
              value: { type: string }
            required: [field_id, label, value]
      required: [form_label, answers]
    handler: actions:register_lead
