id: image_generation
namespace: core.creative
name: Image Generation
description: Generate images in the current conversation using the agent's image-capable model.
system_prompt: |
  Use this skill when the user asks you to generate, create, render, draw, or make an image.
  Ask a concise clarification only when the requested image is materially underspecified.
  After generation, summarize the image result and provide the returned image URL when available.
actions:
  - name: generate
    aliases: [create, create_image, generate_image]
    description: Generate an image from a prompt and attach it to the current conversation.
    input_schema:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Detailed image prompt describing the desired subject, style, composition, and constraints.
        size:
          type: string
          description: Optional image size supported by the model, for example auto, 1024x1024, 1024x1536, or 1536x1024.
        quality:
          type: string
          description: Optional quality supported by the model, for example auto, low, medium, or high.
        output_format:
          type: string
          enum: [png, jpeg, webp]
          description: Output image format. Defaults to png.
    handler: actions:generate
